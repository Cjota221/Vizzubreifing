<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --lime: #beff50;
  --near-black: #14140f;
  --white: #ffffff;
  --cream: #f5f5eb;
  --parchment: #fafaf5;
  --stone: #d2d2c8;
  --graphite: #6e6e64;
  --radius: 26px;
  --radius-sm: 8px;
  --font: 'General Sans', ui-sans-serif, system-ui, -apple-system, sans-serif;
}

html { overflow-x: hidden; }

body {
  font-family: var(--font);
  background: var(--cream);
  color: var(--near-black);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px clamp(20px, 6vw, 40px);
  -webkit-tap-highlight-color: transparent;
}

.bio-card {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.bio-logo {
  height: 56px;
  width: auto;
  object-fit: contain;
  margin-bottom: 28px;
}

.bio-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--white);
  border: 1px solid var(--stone);
  border-radius: var(--radius-sm);
  padding: 6px 14px;
  font-size: .72rem;
  font-weight: 500;
  letter-spacing: .04em;
  color: var(--graphite);
  margin-bottom: 20px;
}

.bio-title {
  font-size: clamp(1.5rem, 6vw, 2rem);
  font-weight: 600;
  line-height: 1.15;
  letter-spacing: -.01em;
  color: var(--near-black);
  margin-bottom: 12px;
}

.bio-title .accent { color: var(--near-black); background: var(--lime); padding: 0 6px; border-radius: 6px; }

.bio-sub {
  font-size: .92rem;
  line-height: 1.55;
  color: var(--graphite);
  max-width: 340px;
  margin-bottom: 36px;
}

.bio-actions {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
}

.btn-primary, .btn-outline {
  position: relative;
  overflow: hidden;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  border-radius: var(--radius);
  padding: 15px 24px;
  font-family: var(--font);
  font-size: .92rem;
  font-weight: 500;
  text-decoration: none;
  min-height: 52px;
  transition: background .15s;
}

.btn-primary {
  background: var(--lime);
  color: var(--near-black);
  border: 1px solid var(--near-black);
}
.btn-primary:hover { background: #a8e83a; }

.btn-outline {
  background: transparent;
  color: var(--near-black);
  border: 1px solid var(--near-black);
}
.btn-outline:hover { background: rgba(20,20,15,.04); }

.rip-dot {
  position: absolute; width: 0; height: 0; border-radius: 50%;
  background: rgba(20,20,15,.1);
  transform: translate(-50%, -50%);
  animation: rip-anim .5s ease-out forwards;
  pointer-events: none;
}
@keyframes rip-anim { to { width: 260px; height: 260px; opacity: 0; } }

.bio-footer {
  margin-top: 40px;
  font-size: .72rem;
  color: var(--graphite);
}

@media (min-width: 480px) {
  .bio-actions { flex-direction: row; justify-content: center; }
  .btn-primary, .btn-outline { width: auto; white-space: nowrap; }
}

@media (prefers-reduced-motion: reduce) {
  * { animation-duration: .01ms !important; transition-duration: .01ms !important; }
}

<script>
document.querySelectorAll('.rip').forEach(btn => {
  btn.addEventListener('click', function(e) {
    const r = this.getBoundingClientRect();
    const dot = document.createElement('span'); dot.className = 'rip-dot';
    dot.style.left = (e.clientX - r.left) + 'px';
    dot.style.top = (e.clientY - r.top) + 'px';
    this.appendChild(dot);
    dot.addEventListener('animationend', () => dot.remove());
  });
});
</script>

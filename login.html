<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIZZU | Entrar</title>
    <link rel="icon" type="image/png" href="assets/fivon.png">
    <link rel="apple-touch-icon" href="assets/fivon.png">
    <link rel="shortcut icon" href="assets/fivon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=General+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin-v3.css">
    <style>
        /* ═══ Login page specific ═══ */
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--cream);
            padding: 20px;
        }
        .login-card {
            background: var(--white);
            border: 1px solid var(--stone);
            border-radius: var(--radius);
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .login-card h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 28px;
            color: var(--near-black);
        }
        .login-card .logo-lime { color: var(--lime); }
        .login-card .logo-orange { color: var(--coral-alert); }
        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: .04em;
            text-transform: uppercase;
            color: var(--graphite);
        }
        .login-error {
            color: var(--coral-alert);
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
        .login-card .btn-primary {
            width: 100%;
            justify-content: center;
            margin-top: 8px;
        }
    </style>
</head>
<body class="login-page">
    <div class="login-card">
        <img src="public/logo principal png.png" alt="VIZZU Digital" style="height:55px;width:auto;margin:0 auto 28px;display:block;">
        <div class="form-group">
            <label for="loginEmail">E-mail</label>
            <input type="email" id="loginEmail" class="form-control" placeholder="seu@email.com">
        </div>
        <div class="form-group">
            <label for="loginPassword">Senha</label>
            <input type="password" id="loginPassword" class="form-control" placeholder="••••••••">
        </div>
        <button class="btn-primary" onclick="login()">Entrar</button>
        <p id="loginError" class="login-error">E-mail ou senha inválidos</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://khoyztycmrryrkbsvhja.supabase.co';
        const SB_KEY = 'sb_publishable_ZyR1Q69Dg7sIkTR7AhnXeg_5CDqKWsZ';
        const _supabase = window.supabase.createClient(SB_URL, SB_KEY);

        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPassword').value.trim();
            if (!email || !pass) { document.getElementById('loginError').style.display = 'block'; return; }

            const { data, error } = await _supabase.auth.signInWithPassword({ email, password: pass });
            if (error) {
                document.getElementById('loginError').style.display = 'block';
                return;
            }
            sessionStorage.setItem('vizzu_auth', data.session.access_token);
            window.location.href = 'admin.html';
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    </script>
</body>
</html>

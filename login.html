<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIZZU | Entrar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F5F3EE;
            --surface: #FFFFFF;
            --border: #E0DDD6;
            --text: #15151A;
            --text-muted: #888888;
            --green: #C8FF3D;
            --green-text: #4a7a00;
            --orange: #FF5A36;
            --radius-pill: 9999px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 20% 10%, rgba(200,255,61,.15), transparent 30%),
                              radial-gradient(circle at 80% 90%, rgba(255,90,54,.07), transparent 25%);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            border-top: 4px solid var(--green);
            box-shadow: 0 24px 70px rgba(21,21,26,.1);
            padding: 44px 40px 40px;
            width: 100%;
            max-width: 420px;
        }
        .logo {
            font-family: 'Poppins', sans-serif;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -.03em;
            text-align: center;
            margin-bottom: 4px;
            color: var(--text);
        }
        .logo-green { color: var(--green); }
        .logo-orange { color: var(--orange); }
        .tagline {
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .12em;
            text-transform: uppercase;
            margin-bottom: 36px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: rgba(74,122,0,.8);
            letter-spacing: .08em;
            text-transform: uppercase;
            margin-bottom: 7px;
        }
        .input-wrap { position: relative; }
        .form-group input {
            width: 100%;
            padding: 13px 18px;
            border: 2px solid var(--border);
            border-radius: var(--radius-pill);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: var(--text);
            background: #fff;
            transition: border-color .2s, box-shadow .2s;
            outline: none;
            -webkit-appearance: none;
        }
        .form-group input:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 4px rgba(200,255,61,.15);
        }
        .toggle-pass {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 4px;
            display: flex;
            align-items: center;
        }
        .toggle-pass:hover { color: var(--text); }
        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--green);
            border: none;
            border-radius: var(--radius-pill);
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 15px;
            color: var(--text);
            cursor: pointer;
            transition: all .2s;
            margin-top: 10px;
        }
        .btn-login:hover {
            background: #d8ff60;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(74,122,0,.18);
        }
        .btn-login:active { transform: translateY(0); }
        .error-msg {
            background: #fff0ee;
            border: 1px solid #ffd3ca;
            border-radius: 12px;
            color: var(--orange);
            font-size: 13px;
            font-weight: 500;
            padding: 10px 14px;
            margin-bottom: 18px;
            display: none;
            text-align: center;
        }
        .error-msg.visible { display: block; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">VIZ<span class="logo-green">Z</span>U<span class="logo-orange">.</span></div>
        <div class="tagline">Painel Administrativo</div>
        <div class="error-msg" id="errorMsg">Usuário ou senha incorretos. Tente novamente.</div>
        <div class="form-group">
            <label for="loginUser">Usuário</label>
            <input type="text" id="loginUser" placeholder="Digite seu usuário" autocomplete="username">
        </div>
        <div class="form-group">
            <label for="loginPass">Senha</label>
            <div class="input-wrap">
                <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" style="padding-right: 44px;">
                <button type="button" class="toggle-pass" onclick="togglePass()" aria-label="Mostrar/ocultar senha">
                    <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
        </div>
        <button class="btn-login" onclick="doLogin()">Entrar</button>
    </div>

    <script>
        const ADMIN_USER = 'vizzu';
        const ADMIN_PASS = 'vizzu2024@';

        if (sessionStorage.getItem('vizzu_auth') === 'ok') {
            window.location.href = 'admin.html';
        }

        function doLogin() {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value;
            const err = document.getElementById('errorMsg');
            if (user === ADMIN_USER && pass === ADMIN_PASS) {
                sessionStorage.setItem('vizzu_auth', 'ok');
                window.location.href = 'admin.html';
            } else {
                err.classList.add('visible');
                document.getElementById('loginPass').value = '';
                document.getElementById('loginPass').focus();
            }
        }

        function togglePass() {
            const inp = document.getElementById('loginPass');
            inp.type = inp.type === 'password' ? 'text' : 'password';
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
        document.getElementById('loginUser').addEventListener('input', () => document.getElementById('errorMsg').classList.remove('visible'));
        document.getElementById('loginPass').addEventListener('input', () => document.getElementById('errorMsg').classList.remove('visible'));
    </script>
</body>
</html>

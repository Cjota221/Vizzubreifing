<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f5f5eb">
    <title>VIZZU | Sua Proposta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=General+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .proposta-page { max-width: 700px; margin: 0 auto; padding: 40px 24px 80px; }
        .proposta-nav {
            max-width: 900px; margin: 0 auto; padding: 0 24px;
            display: flex; align-items: center; justify-content: space-between; height: 62px;
        }
        .proposta-nav .logo { font-size: 22px; font-weight: 600; letter-spacing: -.02em; text-decoration: none; color: var(--near-black); }
        .proposta-nav .logo-lime { color: var(--lime); }
        .proposta-nav .logo-orange { color: var(--coral-alert); }
        .nav-wrapper { background: var(--cream); border-bottom: 1px solid var(--stone); }

        .state-card { text-align: center; padding: 80px 24px; background: var(--white); border: 1px solid var(--stone); border-radius: var(--radius); }
        .state-card .loader { display: block; width: 32px; height: 32px; margin: 0 auto 16px; border: 3px solid var(--stone); border-top-color: var(--lime); border-radius: 50%; animation: spin .6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .state-card h2 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .state-card p { color: var(--graphite); font-size: 15px; }
        .error-state .state-icon { width: 48px; height: 48px; stroke: var(--coral-alert); fill: none; stroke-width: 1.5; margin-bottom: 16px; }

        .proposta-card {
            background: var(--white); border: 1px solid var(--stone); border-radius: var(--radius);
            padding: 40px;
        }
        .proposta-card .cliente-info { margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--stone); }
        .proposta-card .cliente-info h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; }
        .proposta-card .cliente-info .meta { color: var(--graphite); font-size: 14px; }
        .proposta-card .cliente-info .data { font-size: 13px; color: var(--stone); margin-top: 8px; }

        .prop-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--stone); font-size: 14px; }
        .prop-item:last-child { border-bottom: none; }
        .prop-item .prop-nome { color: var(--near-black); }
        .prop-item .prop-valor { font-weight: 500; }
        .prop-divider { border: none; border-top: 2px solid var(--near-black); margin: 16px 0; }
        .prop-total { display: flex; justify-content: space-between; font-size: 20px; font-weight: 600; margin-bottom: 8px; }
        .prop-pix { font-size: 13px; color: var(--graphite); margin-bottom: 24px; }
        .prop-desconto { font-size: 13px; color: var(--coral-alert); margin-bottom: 4px; }

        .prop-actions { display: flex; gap: 12px; margin-top: 28px; flex-wrap: wrap; }
        .prop-actions .btn-primary, .prop-actions .btn-secondary { flex: 1; justify-content: center; }

        .status-badge {
            display: inline-flex; padding: 3px 10px; border-radius: var(--radius-sm);
            font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .04em;
        }
        .status-badge.pendente { background: #FFF4DB; color: #9A5A00; }
        .status-badge.aprovada { background: var(--lime); color: var(--near-black); border: 1px solid var(--near-black); }
        .status-badge.recusada { background: rgba(235,49,49,.08); color: var(--coral-alert); }
    </style>
</head>
<body style="background:var(--cream);">
    <div class="nav-wrapper">
        <div class="proposta-nav">
            <div class="logo">VIZ<span class="logo-lime">Z</span>U<span class="logo-orange">.</span></div>
            <a href="index.html" class="btn-secondary rip" style="text-decoration:none;padding:9px 18px;">← Voltar</a>
        </div>
    </div>

    <div class="proposta-page">
        <div id="loadingView" class="state-card">
            <span class="loader"></span>
            <p>Carregando sua proposta...</p>
        </div>

        <div id="errorView" class="state-card error-state" style="display:none;">
            <svg class="state-icon" viewBox="0 0 24 24"><path d="M12 9v4m0 4h.01M10.3 3.7 2.7 17a2 2 0 0 0 1.7 3h15.2a2 2 0 0 0 1.7-3L13.7 3.7a2 2 0 0 0-3.4 0Z"/></svg>
            <h2>Proposta não encontrada</h2>
            <p>Verifique o link recebido e tente novamente.</p>
        </div>

        <div id="propostaContent" style="display:none;">
            <div class="proposta-card" id="propostaBody">
                <div class="cliente-info">
                    <h1 id="propCliente">Cliente</h1>
                    <div class="meta"><span id="propStore">Loja</span> · <span id="propPhone">WhatsApp</span></div>
                    <div class="data" id="propDate">Data</div>
                </div>
                <div id="propItems"></div>
                <hr class="prop-divider">
                <div class="prop-total"><span>Total</span><span id="propTotal">R$ 0,00</span></div>
                <div class="prop-desconto" id="propDesconto"></div>
                <div class="prop-pix" id="propPix">⬡ 5% de desconto no Pix</div>
                <div class="prop-actions">
                    <a id="propWpLink" href="#" target="_blank" class="btn-primary rip">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/></svg>
                        Falar no WhatsApp
                    </a>
                    <a href="index.html" class="btn-secondary rip" style="text-align:center;">Ver site completo</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://kvpetrexgrpizwfomjjt.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2cGV0cmV4Z3JwaXp3Zm9tamp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4MzkzNjUsImV4cCI6MjA4NDQxNTM2NX0.kP9TQqYIiPchtd7Y89oQdg78nZw4GBiTvLhxhz1vWs8';
        const db = window.supabase.createClient(SB_URL, SB_KEY);

        async function loadProposta() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id') || new URL(window.location.href).pathname.split('/').pop().split('.')[0];

            if (!id) {
                document.getElementById('loadingView').style.display = 'none';
                document.getElementById('errorView').style.display = 'block';
                return;
            }

            try {
                const { data, error } = await db.from('propostas').select('*').eq('id', id).single();
                if (error || !data) throw new Error('Not found');

                document.getElementById('loadingView').style.display = 'none';
                document.getElementById('propostaContent').style.display = 'block';

                document.getElementById('propCliente').textContent = data.nome || 'Cliente';
                document.getElementById('propStore').textContent = data.loja || '';
                document.getElementById('propPhone').textContent = data.whatsapp || '';
                document.getElementById('propDate').textContent = new Date(data.created_at).toLocaleDateString('pt-BR');

                const items = data.itens || [];
                const container = document.getElementById('propItems');
                container.innerHTML = items.map(i =>
                    `<div class="prop-item"><span class="prop-nome">${i.nome}</span><span class="prop-valor">R$ ${i.valor.toLocaleString('pt-BR', {minimumFractionDigits:2})}</span></div>`
                ).join('');

                document.getElementById('propTotal').textContent = `R$ ${data.total.toLocaleString('pt-BR', {minimumFractionDigits:2})}`;

                if (data.desconto) {
                    document.getElementById('propDesconto').textContent = `Desconto: ${data.desconto}`;
                }

                document.getElementById('propWpLink').href = `https://wa.me/55${data.whatsapp?.replace(/\D/g,'') || '5562981043763'}?text=Olá! Recebi minha proposta da VIZZU.`;

            } catch (e) {
                document.getElementById('loadingView').style.display = 'none';
                document.getElementById('errorView').style.display = 'block';
            }
        }

        loadProposta();
    </script>
</body>
</html>
